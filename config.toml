# tarots_plugin - 配置文件
# 提供高版本塔罗牌占卜功能，牌面为BiliBili幻星集
# 配置版本: 4.1.0

# 插件基本配置
[plugin]

# 配置文件版本
config_version = "4.1.0"

# 是否启用插件
enabled = true


# 组件启用控制
[components]

# 启用塔罗牌占卜功能
enable_tarots = true


# 牌组配置
[cards]

# 当前使用牌组
using_cards = "bilibili"

# 可用牌组列表
use_cards = ["bilibili"]


